{% load static %}
{% load i18n %}
{% load compress %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adivina si el valor de mercado de la siguiente jugadora es mayor o menor que el actual. Pon a prueba tus conocimientos sobre fútbol femenino y compite por la mejor puntuación en este emocionante juego de adivinanzas.">
    <title>{% trans "Higher Or Lower" %}</title>
    <link rel="icon" href="{% static 'img/logo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;700&display=swap" media="print" onload="this.media='all'">

    <!--<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" media="print" onload="this.media='all'">-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" media="print" onload="this.media='all'">

    <link rel="modulepreload" href="/static/js/games/higherlower.js">
    <link rel="modulepreload" href="/static/js/games/funciones-comunes.js">
    <link rel="modulepreload" href="/static/futfem/js/jugadora.js">

    {% compress css inline %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
    <link rel="stylesheet" href="{% static 'css/higher_lower.css' %}">
    {% endcompress %}
    <noscript>
        <!--<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">
    </noscript>
</head>
<body {% if usuario_sesion.equipo_favorito.id_equipo %}data-team="{{ usuario_sesion.equipo_favorito.id_equipo }}"{% endif %}>
    {% include 'partials/header.html' %}

    <div id="game">
        <img id="game-logo" src="{% static 'img/higher_lower1.webp' %}" fetchpriority="high" alt="Higher or Lower Logo">
        <div id="option1">
            <img id="player1" fetchpriority="high" alt="Player 1" style="width: 100px; height: 100px; object-fit: cover;">
            <h3 id="name1">Nombre</h3>
            <p id="marketvalue1">Valor mercado</p>
        </div>
        <div id="option2">
            <img id="player2" fetchpriority="high" alt="Player 2" style="width: 100px; height: 100px; object-fit: cover;">
            <h3 id="name2">Nombre</h3>
            <p id="marketvalue2" style="visibility: hidden;">Valor mercado</p>
        </div>
    </div>
    {% include 'partials/popup_gameover.html' %}
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js" defer></script>
    <script src="{% static 'js/animations/header.js' %}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js" defer></script>
    <script type="module" src="{% static 'js/games/higherlower.js' %}"></script>
</body>
</html>
