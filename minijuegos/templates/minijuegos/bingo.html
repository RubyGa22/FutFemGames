{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Futfem Bingo</title>
    <link rel="icon" href="{% static 'img/logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="{% static 'css/bingo.css' %}">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
    {% include 'partials/header.html' %}
    <div id="bg-dynamic"></div>
<div class="contenedor">
    <div id="cabecera-bingo">
    <!-- Imagen y nombre del jugador -->
    <div class="player">
        <img id="player-image" src="{% static '/img/predeterm.jpg' %}" alt="Jugador">
        <div id="player-name" class="player-name">Jugadora</div>
        <!-- Botón de Skip -->
    </div>
    <button class="skip-button">{% trans "SKIP" %}</button>
    </div>
    <div id="reloj">Tiempo</div>
    <div id="resultado"></div>
    <table id="grid">
    <tbody>
        <tr>
            <td id="c11"></td>
            <td id="c12"></td>
            <td id="c13"></td>
            <td id="c14"></td>
        </tr>
        <tr>
            <td id="c21"></td>
            <td data-answer="jugadora1" id="c22"></td>
            <td data-answer="jugadora2" id="c23"></td>
            <td data-answer="jugadora3" id="c24"></td>
        </tr>
        <tr>
            <td id="c31"></td>
            <td data-answer="jugadora4" id="c32"></td>
            <td data-answer="jugadora5" id="c33"></td>
            <td data-answer="jugadora6" id="c34"></td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="{% url 'javascript-catalog' %}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
<script src="{% static 'js/admin.js' %}"></script>
<script src="{% static 'js/animations/bingo.js' %}"></script>
<script type="module" src="{% static 'js/games/bingo.js' %}"></script>
</body>
</html>
