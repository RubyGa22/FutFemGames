{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutFemGames Ranking</title>
    <link rel="icon" href="{% static 'img/logo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
    <link rel="stylesheet" href="{% static 'usuarios/css/ranking.css' %}">
</head>
<body>
    {% include 'partials/header.html' %}

    <div class="container-ranking mt-5">
        <div class="glass p-4">
            <h2 class="mb-4">{% trans "Clasificación Global" %}</h2>
            
            <div class="d-flex justify-content-between align-items-center mb-4 filtros">
                <div class="d-flex flex-column align-items-start">
                <label for="filtro-juego" class="form-label mb-0">{% trans "Filtrar por juego:" %}</label>
                <select id="filtro-juego" class="form-select bg-dark text-white border-0 shadow-sm" style="width: 250px;">
                    <option value="1">{% trans "Futfem Career" %}</option>
                    <option value="2">{% trans "Futfem Wordle" %}</option>
                    <option value="3">{% trans "Futfem Guess" %}</option>
                    <option value="4">{% trans "Futfem Grid" %}</option>
                    <option value="5">{% trans "Futfem Mates" %}</option>
                    <option value="6">{% trans "Futfem Bingo" %}</option>
                    <option value="7">{% trans "Higher or Lower" %}</option>
                </select>
                </div>
                
                <span class="badge bg-primary">{% trans "Top 10 Jugadores" %}</span>
            </div>

            <div id="tabla-ranking-container">
                <table class="table table-hover custom-table-glass" style="border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th class="text-center">#</th>
                            <th>{% trans "Usuario" %}</th>
                            <th>{% trans "Juego" %}</th>
                            <th class="text-center">{% trans "Racha" %}</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="{% url 'javascript-catalog' %}"></script>
    <script type="module">
        import { cargarRanking } from '{% static "usuarios/js/rachas.js" %}';

        // 1. Función para orquestar la carga y el dibujado
        async function actualizarRanking(juegoId) {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center">{% trans "Cargando..." %}</td></tr>';
            
            try {
                const data = await cargarRanking(juegoId);
                displayRanking(data);
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">{% trans "Error al cargar los datos" %}</td></tr>';
            }
        }

        // 2. Evento Change (ahora es async)
        document.getElementById('filtro-juego').addEventListener('change', async function() {
            await actualizarRanking(this.value);
        });

        // 3. Función para pintar (limpia de lógica de carga)
        function displayRanking(datos) {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = ''; 

            if (datos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">{% trans "No hay puntuaciones para este juego" %}</td></tr>';
                return;
            }

            datos.forEach((fila, index) => {
                const tr = document.createElement('tr');
                const medalClass = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index + 1;
                let iconosrc = '';
                if (fila.es_jugadora) {
                    iconosrc = '/static/img/verified.png';
                }
                if (fila.miembro) {
                    iconosrc = '/static/img/logo.png';
                }
                
                tr.innerHTML = `
                    <td class="text-center fw-bold align-middle">${medalClass}</td>
                    <td class="align-middle">
                        <div class="d-flex align-items-center">
                            <a href="/accounts/perfil/${fila.username}/" class="text-decoration-none text-info fw-bold" id="usuario-${fila.username}">
                                <img src="${fila.foto_perfil}" 
                                class="avatar" 
                                style="width: 60px; height: 60px; object-fit: cover;">
                                ${fila.username}
                                ${iconosrc ? `<img src="${iconosrc}" class="ms-2" style="width: 20px; height: 20px;" title="{% trans 'Miembro del equipo' %}">` : ''}
                            </a>
                        </div>
                    </td>
                    <td class="align-middle">${fila.nombre_juego}</td>
                    <td class="text-center racha-num align-middle">${fila.mejor_racha}</td>
                `;
                tr.classList.add('glass');
                tbody.appendChild(tr);
            });
        }

        // 4. Carga inicial (Top-level await permitido en type="module")
        await actualizarRanking(1);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
