{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutFemGames Ranking</title>
    <link rel="icon" href="{% static 'img/logo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
    <link rel="stylesheet" href="{% static 'css/combo.css' %}">
</head>
<body>
    {% include 'partials/header.html' %}
    <div class="container">
        <h1>{% trans "Buscar Usuarios" %}</h1>
        <div class="autocomplete-container">
            <input type="text" id="usuarioInput" placeholder="{% trans 'Buscar por usuario...' %}" autocomplete="off">
            <div id="sugerencias-container">
                <ul id="sugerencias"></ul>
            </div>
        </div>
        <div id="usuario-details"></div>
    </div>
    <script src="{% url 'javascript-catalog' %}"></script>
    <script type="module">
        import { handleAutocompleteUser } from "{% static 'usuarios/js/users.js' %}";
        document.getElementById("usuarioInput").addEventListener("input", handleAutocompleteUser);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
