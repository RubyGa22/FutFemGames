{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Reestablecer Contraseña" %}</title>
    <link rel="icon" href="{% static 'img/logo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
    <link rel="stylesheet" href="{% static 'usuarios/css/login.css' %}">
</head>
<body>
    {% include 'partials/header.html' %}
    <div class="container-login">
        <form class="glass" method="post">
            {% csrf_token %}
            <h2>{% trans "Reestablecer Contraseña" %}</h2>
            <div id="div-email">
                <label for="email">{% trans "Email" %}:</label>
                <input type="email" name="email" placeholder="{% trans 'Email' %}" required>
            </div>
            <button type="submit">{% trans "Enviar correo" %}</button>
            {% if mensaje_exito %}
            <div class="glass" style="border: 1px solid var(--color-success); padding: 15px; color: white; margin-bottom: 20px;">
                <p>✅ {{ mensaje_exito }}</p>
            </div>
            {% endif %}

            {% if error %}
            <div class="glass" style="border: 1px solid var(--color-danger); padding: 15px; color: white; margin-bottom: 20px;">
                <p>❌ {{ error }}</p>
            </div>
            {% endif %}
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
